services:
  pulsar:
    image: apachepulsar/pulsar:3.2.0
    container_name: pulsar-standalone
    restart: unless-stopped
    ports:
      - "6650:6650"   # Pulsar binary protocol (producers/consumers)
      - "8080:8080"   # Pulsar admin REST API
    volumes:
      - pulsar-data:/pulsar/data
    environment:
      PULSAR_MEM: "-Xms512m -Xmx1g -XX:MaxDirectMemorySize=1g"
    command: >
      bin/pulsar standalone
      --no-functions-worker
      --no-stream-storage
    healthcheck:
      test: ["CMD", "bin/pulsar-admin", "brokers", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

volumes:
  pulsar-data:
